services:
  frontend:
    platform: linux/amd64
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cesfam-frontend-local
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always

  backend:
    platform: linux/amd64
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cesfam-backend-local
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - DATABASE_URL=postgresql://cesfam_user:cesfam_secure_password@database:5432/cesfam
    depends_on:
      - database
    restart: always

  database:
    image: postgres:15-alpine
    container_name: cesfam-database-local
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=cesfam
      - POSTGRES_USER=cesfam_user
      - POSTGRES_PASSWORD=cesfam_secure_password
    volumes:
      - pgdata_local:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    restart: always

volumes:
  pgdata_local:
