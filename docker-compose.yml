services:
  frontend:
    platform: linux/amd64
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: cesfam-frontend-local
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always

  backend:
    platform: linux/amd64
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: cesfam-backend-local
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://cesfam_user:cesfam_secure_password@database:5432/cesfam
    depends_on:
      - database
    restart: always

  database:
    image: postgres:15-alpine
    container_name: cesfam-database-local
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=cesfam
      - POSTGRES_USER=cesfam_user
      - POSTGRES_PASSWORD=cesfam_secure_password
    volumes:
      - pgdata_local:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    restart: always

  ai:
    image: ollama/ollama:latest
    container_name: cesfam-ai-local
    ports:
      - "11434:11434"
    volumes:
      - ollama_local:/root/.ollama
    restart: always

  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: cesfam-n8n-local
    ports:
      - "5678:5678"
    environment:
      # Persistencia en PostgreSQL (mismas credenciales del proyecto)
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=cesfam-database-local
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=cesfam
      - DB_POSTGRESDB_USER=cesfam_user
      - DB_POSTGRESDB_PASSWORD=cesfam_secure_password
      # URL base para webhooks
      - WEBHOOK_URL=http://localhost:5678/
      # Zona horaria
      - GENERIC_TIMEZONE=America/Santiago
      - TZ=America/Santiago
    volumes:
      - ./n8n_data:/home/node/.n8n
    depends_on:
      - database
      - ai
    restart: always
volumes:
  pgdata_local:
  ollama_local:
  # n8n_data se gestiona como bind mount (./n8n_data) — no necesita declararse aquí
