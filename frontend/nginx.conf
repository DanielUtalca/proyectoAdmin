server {
    listen 80;
    server_name localhost;

    # Habilitar compresión Gzip para mejorar el rendimiento de carga
    gzip on;
    gzip_vary on;
    gzip_min_length 10240;
    gzip_proxied expired no-cache no-store private auth;
    gzip_types text/plain text/css text/xml text/javascript application/x-javascript application/xml application/javascript;
    gzip_disable "MSIE [1-6]\.";

    # Directorio raíz y archivos índice
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        # Redireccionar todas las peticiones a index.html para React Router (SPA)
        try_files $uri $uri/ /index.html;
    }

    # Plantilla para proxy inverso hacia el backend en el futuro
    # location /api/ {
    #     proxy_pass http://cesfam-backend:5000/;
    #     proxy_http_version 1.1;
    #     proxy_set_header Upgrade $http_upgrade;
    #     proxy_set_header Connection 'upgrade';
    #     proxy_set_header Host $host;
    #     proxy_cache_bypass $http_upgrade;
    # }

    # Configuración de páginas de error
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
